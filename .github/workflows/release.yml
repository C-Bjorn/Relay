name: Plugin release

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
      - name: Build
        run: |
          npm ci
          npm run release
      - name: Create zip archive
        run: |
          zip -j plugin.zip main.js manifest.json styles.css
      - name: Create Release
        uses: ncipollo/release-action@v1.7.3
        with:
          artifacts: "main.js,manifest.json,styles.css,plugin.zip"
          generateReleaseNotes: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
